# ============================================================
# Smart Expense Analyzer - Spring Boot Configuration
# ============================================================

# MySQL Database Connection
# Spring Boot reads this and creates the DataSource bean automatically
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker
spring.datasource.username=root
spring.datasource.password=PranavKharage
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# update = Hibernate checks your @Entity classes and updates DB schema automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server runs on port 8080 by default
server.port=8080

# App name
spring.application.name=smart-expense-tracker
